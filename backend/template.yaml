AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GeoChallenger Leaderboard API

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: !Ref LeaderboardTable

Resources:
  LeaderboardApi:
    Type: AWS::Serverless::HttpApi

  LeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeaderboardTable
      Events:
        GetScores:
          Type: HttpApi
          Properties:
            ApiId: !Ref LeaderboardApi
            Path: /scores
            Method: GET
        PostScore:
          Type: HttpApi
          Properties:
            ApiId: !Ref LeaderboardApi
            Path: /scores
            Method: POST

  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: GeoLeaderboard
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

Outputs:
  ApiUrl:
    Description: Leaderboard API URL
    Value: !Sub "https://${LeaderboardApi}.execute-api.${AWS::Region}.amazonaws.com"
