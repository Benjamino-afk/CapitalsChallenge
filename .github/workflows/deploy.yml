name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::177904955470:role/github-geochallenger-deploy
          aws-region: ap-southeast-2

      - name: Sync to S3
        run: |
          aws s3 sync . s3://geochallenger-avgchap-com \
            --exclude "*" \
            --include "app.js" \
            --include "style.css" \
            --include "manifest.json" \
            --include "sw.js" \
            --include "index.html" \
            --include "icons/*" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp index.html s3://geochallenger-avgchap-com/index.html \
            --cache-control "public,max-age=0,must-revalidate"
          aws s3 cp sw.js s3://geochallenger-avgchap-com/sw.js \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E1O159TNDV3K2U --paths "/*"
